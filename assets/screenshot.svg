<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="system-ui,Segoe UI,Helvetica,sans-serif">
  <rect width="800" height="380" fill="#0d1117"/>
  <text x="24" y="38" font-size="18" font-weight="800" fill="#e6edf3">otel-trace-analyzer</text>
  <text x="260" y="38" font-size="13" fill="#7d8590">where did the 100ms go?</text>
  <!-- gantt -->
  <g font-family="SFMono-Regular,monospace" font-size="11.5">
    <text x="24" y="74" fill="#9aa4b2">GET /orders</text>
    <rect x="150" y="64" width="600" height="14" rx="3" fill="#30363d"/><rect x="150" y="64" width="600" height="14" rx="3" fill="#1f6feb" opacity="0.4"/>
    <text x="44" y="98" fill="#9aa4b2">auth</text>
    <rect x="150" y="88" width="18" height="14" rx="3" fill="#8957e5"/>
    <text x="44" y="122" fill="#9aa4b2">handler</text>
    <rect x="168" y="112" width="552" height="14" rx="3" fill="#1f6feb"/>
    <text x="64" y="146" fill="#9aa4b2">db.query</text>
    <rect x="180" y="136" width="60" height="14" rx="3" fill="#3fb950"/>
    <text x="64" y="170" fill="#9aa4b2">render</text>
    <rect x="270" y="160" width="420" height="14" rx="3" fill="#f85149"/>
    <text x="700" y="170" fill="#f85149">70ms self ★</text>
  </g>
  <rect x="24" y="190" width="752" height="150" rx="8" fill="#161b22" stroke="#30363d"/>
  <text font-size="12.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="40" y="216" fill="#7d8590">analyze(spans) →</tspan>
    <tspan x="40" y="240" fill="#c9d1d9">  total: 100ms   spanCount: 5</tspan>
    <tspan x="40" y="262" fill="#c9d1d9">  criticalPath: </tspan><tspan fill="#58a6ff">GET /orders → handler → render</tspan>
    <tspan x="40" y="284" fill="#c9d1d9">  slowest: </tspan><tspan fill="#f85149">render (70ms self time)</tspan>
    <tspan x="40" y="306" fill="#c9d1d9">  nPlusOne: </tspan><tspan fill="#d29922">handler → "SELECT user" ×6  ⚠</tspan>
    <tspan x="40" y="328" fill="#7d8590">  self-time merges overlapping children — no double counting</tspan>
  </text>
  <text x="24" y="368" font-size="12" fill="#3fb950" font-family="SFMono-Regular,monospace">✓ 7 tests · flat or OTLP-nano input · critical path · slowest span · N+1 detection</text>
</svg>
